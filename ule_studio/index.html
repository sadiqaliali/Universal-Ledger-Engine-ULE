<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULE Professional Studio</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [db, setDb] = React.useState(null);
            const [view, setView] = React.useState('explorer');
            const [schema, setSchema] = React.useState({sql_tables:[], collections:[], vector_sets:[]});
            const [data, setData] = React.useState([]);

            const login = async (path, pass) => {
                const res = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({db_path: path, password: pass})
                });
                if (res.ok) {
                    setDb(path);
                    const s = await fetch(`http://127.0.0.1:8000/schema/${path}`);
                    setSchema(await s.json());
                } else { alert("Auth Failed: Ensure credentials and path are correct."); }
            };

            const fetchData = async (type, name) => {
                const res = await fetch(`http://127.0.0.1:8000/data/${db}/${name}`);
                setData(await res.json());
            };

            const logout = async () => {
                await fetch(`http://127.0.0.1:8000/auth/logout/${db}`, {method: 'POST'});
                setDb(null); setData([]);
            };

            return (
                <div className="flex h-screen">
                    <aside className="w-64 bg-slate-950 text-slate-300 p-6 flex flex-col">
                        <h1 className="text-xl font-bold text-white mb-8">ULE Studio Pro</h1>
                        <nav className="flex-1 space-y-2">
                            <button className="w-full text-left py-2 px-4 hover:bg-slate-800 rounded" onClick={()=>setView('explorer')}>📁 Explorer</button>
                            <button className="w-full text-left py-2 px-4 hover:bg-slate-800 rounded" onClick={()=>setView('query')}>💻 Query Console</button>
                            <button className="w-full text-left py-2 px-4 hover:bg-slate-800 rounded" onClick={()=>setView('audit')}>🔗 Audit Ledger</button>
                        </nav>
                        {db && <button className="text-red-400 text-sm mt-auto" onClick={logout}>Lock & Disconnect</button>}
                    </aside>
                    <main className="flex-1 bg-white overflow-y-auto p-8">
                        {!db ? (
                            <div className="max-w-md mx-auto mt-20 p-8 border rounded-lg shadow-sm">
                                <h2 className="text-xl font-bold mb-4">Secure Vault Login</h2>
                                <input className="border p-2 w-full mb-3 rounded" id="path" defaultValue="my_vault.udb" />
                                <input className="border p-2 w-full mb-4 rounded" id="pass" type="password" placeholder="Master Key" />
                                <button className="bg-blue-700 text-white w-full py-2 rounded hover:bg-blue-800" onClick={() => login(document.getElementById('path').value, document.getElementById('pass').value)}>Authorize Session</button>
                            </div>
                        ) : (
                            <div>
                                <h2 className="text-2xl font-bold mb-6 capitalize">{view}</h2>
                                {view === 'explorer' && (
                                    <div className="grid grid-cols-3 gap-6">
                                        <div className="border p-4 rounded"><h3 className="font-bold mb-2">Tables</h3>{schema.sql_tables.map(t => <button key={t} className="block text-blue-600 underline" onClick={()=>fetchData('table', t)}>{t}</button>)}</div>
                                        <div className="border p-4 rounded"><h3 className="font-bold mb-2">Documents</h3>{schema.collections.map(c => <button key={c} className="block text-blue-600 underline" onClick={()=>fetchData('collection', c)}>{c}</button>)}</div>
                                        <div className="border p-4 rounded"><h3 className="font-bold mb-2">Vectors</h3>{schema.vector_sets.map(v => <button key={v} className="block text-blue-600 underline" onClick={()=>fetchData('vector', v)}>{v}</button>)}</div>
                                    </div>
                                )}
                                {data.length > 0 && <div className="mt-8 overflow-x-auto"><table className="w-full text-sm border"><thead><tr className="bg-gray-100">{Object.keys(data[0]).map(k => <th key={k} className="p-2 border">{k}</th>)}</tr></thead><tbody>{data.map((r,i) => <tr key={i}>{Object.values(r).map((v,j) => <td key={j} className="p-2 border">{JSON.stringify(v)}</td>)}</tr>)}</tbody></table></div>}
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
